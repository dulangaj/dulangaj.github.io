    <!-- Anti-FOUC: apply stored theme before first paint so there's no flash -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('theme-preference');
          if (p === 'dark' || p === 'light') {
            document.documentElement.setAttribute('data-theme', p);
          }
        } catch (e) {}
      })();
    </script>
    <!-- Pre-render loading state: shown while JS downloads, React replaces it on mount -->
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2rem;
        background: #fafaf8;
        color: #1a1918;
        text-align: center;
      }
      html[data-theme="dark"] #app-loading { background: #1a1918; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) #app-loading {
          background: #1a1918;
          color: #f5f1eb;
        }
      }
      html[data-theme="dark"] #app-loading { color: #f5f1eb; }
      .app-loading__rule {
        width: 40px;
        height: 1px;
        background: #dc2626;
      }
      .app-loading__label {
        margin: 0;
        font: 400 10px/1.4 ui-monospace, SFMono-Regular, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #73706b;
      }
      .app-loading__note {
        display: none;
        max-width: 24rem;
        margin: 0;
        font: 400 0.875rem/1.6 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #5f5a55;
      }
      #app-loading[data-state="stalled"] .app-loading__note,
      #app-loading[data-state="error"] .app-loading__note {
        display: block;
      }
      #app-loading[data-state="error"] .app-loading__label,
      #app-loading[data-state="error"] .app-loading__note {
        color: #b42318;
      }
      html[data-theme="dark"] .app-loading__label { color: #b7b1aa; }
      html[data-theme="dark"] .app-loading__note { color: #d2ccc4; }
      html[data-theme="dark"] #app-loading[data-state="error"] .app-loading__label,
      html[data-theme="dark"] #app-loading[data-state="error"] .app-loading__note {
        color: #fda29b;
      }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) .app-loading__label { color: #b7b1aa; }
        html:not([data-theme="light"]) .app-loading__note { color: #d2ccc4; }
        html:not([data-theme="light"]) #app-loading[data-state="error"] .app-loading__label,
        html:not([data-theme="light"]) #app-loading[data-state="error"] .app-loading__note {
          color: #fda29b;
        }
      }
      #app-noscript {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: #fafaf8;
        color: #1a1918;
        text-align: center;
      }
      #app-noscript p {
        max-width: 24rem;
        margin: 0;
        font: 400 0.95rem/1.7 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html[data-theme="dark"] #app-noscript {
        background: #1a1918;
        color: #f5f1eb;
      }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) #app-noscript {
          background: #1a1918;
          color: #f5f1eb;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading" data-state="loading" role="status" aria-live="polite" aria-busy="true">
        <div class="app-loading__rule" aria-hidden="true"></div>
        <p class="app-loading__label" id="app-loading-label">Loading site</p>
        <p class="app-loading__note" id="app-loading-note">Refresh if this takes more than a few seconds.</p>
      </div>
    </div>
    <noscript>
      <style>
        #app-loading { display: none; }
      </style>
      <div id="app-noscript" role="status">
        <p>This site needs JavaScript to load. Enable it, then refresh the page.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx" id="app-entry"></script>
    <script>
      (function () {
        var loading = document.getElementById('app-loading');
        var label = document.getElementById('app-loading-label');
        var note = document.getElementById('app-loading-note');
        var entry = document.getElementById('app-entry');
        if (!loading || !label || !note) return;

        function setState(state, nextLabel, nextNote) {
          if (!document.getElementById('app-loading')) return;
          loading.setAttribute('data-state', state);
          label.textContent = nextLabel;
          note.textContent = nextNote;
        }

        function cleanup() {
          window.clearTimeout(stalledTimer);
          window.removeEventListener('app:mounted', cleanup);
          if (entry) entry.removeEventListener('error', markFailed);
        }

        function markFailed() {
          setState('error', 'Site failed to load', 'Refresh and try again.');
          cleanup();
        }

        var stalledTimer = window.setTimeout(function () {
          setState('stalled', 'Still loading', 'Refresh if this takes more than a few seconds.');
        }, 10000);

        if (entry) entry.addEventListener('error', markFailed);
        window.addEventListener('app:mounted', cleanup, { once: true });
      })();
    </script>
  </body>
