<header class="site-header" data-reveal>
  <div class="brand">
    <a class="brand-mark" href="{{ '/' | relative_url }}" aria-label="Go to homepage">DJ</a>
    <div>
      <a class="brand-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="brand-tagline">{{ site.description }}</p>
    </div>
  </div>
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" data-nav-toggle>
    Menu
  </button>
  <nav class="primary-nav" id="primary-nav" data-nav aria-label="Primary">
    <ul>
      {% for item in site.data.settings.menu %}
        <li><a href="{{ '/' | append: item.url | relative_url }}">{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</header>
