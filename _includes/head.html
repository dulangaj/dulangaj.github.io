<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% assign meta_description = page.excerpt | strip_html | default: site.description %}
  <meta name="description" content="{{ meta_description | strip_newlines }}">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050505">
  <title>
    {% if page.title == "Home" %}
      {{ site.title }} · {{ site.description }}
    {% else %}
      {{ page.title }} · {{ site.title }}
    {% endif %}
  </title>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NJQZ5S8WWB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NJQZ5S8WWB');
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Dulanga Jayawardena",
      "url": "https://dulangaj.github.io/",
      "sameAs": [
        "https://linkedin.com/in/dulangaj",
        "https://github.com/dulangaj"
      ],
      "jobTitle": "Software Engineer",
      "knowsAbout": ["Software Engineering", "Fintech", "Java", "Python"]
    }
  </script>
</head>
